services:

  app1:
    image: devops-api
    container_name: app1
    build:
      context: .
      dockerfile: Dockerfile

  app2:
    image: devops-api
    container_name: app2
    build:
      context: .
      dockerfile: Dockerfile

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8081:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2